commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-commit:
  commands:
    biome-format:
      glob: "*.{ts,json}"
      run: bunx biome format --write {staged_files} && git add {staged_files}
    lint:
      glob: "*.ts"
      run: bunx biome check {staged_files}
    typecheck:
      run: bun run typecheck
